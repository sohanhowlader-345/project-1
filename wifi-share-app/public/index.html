<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WiFi Share</title>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

<div class="container">
  <h1>WiFi File Share</h1>

  <div class="card">
    <h2>Connect Devices</h2>
    <p id="url"></p>
    <img id="qr"/>
  </div>

  <div class="card">
    <h2>Upload File</h2>

    <div class="drop-zone" id="dropZone">
      Drag & Drop File Here
    </div>

    <input type="file" id="fileInput" hidden />
    <button id="chooseBtn">Choose File</button>
  </div>

  <div class="card">
    <h2>Shared Files</h2>
    <div id="fileList"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
